<mat-card class="details-card">
  <mat-card-header>
    <mat-card-title>{{ job.title }}</mat-card-title>
    <mat-card-subtitle>{{ job.company }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="meta">
      <mat-icon>location_on</mat-icon>
      <span>{{ job.location }}</span>
    </div>

    @if (job.description) {
      <p class="description">
        {{ job.description }}
      </p>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    @if (canApply) {
      <button mat-flat-button color="primary" [disabled]="isApplied" (click)="onApply()">
        {{ isApplied ? 'Applied' : 'Apply Now' }}
      </button>
    }
  </mat-card-actions>
</mat-card>
